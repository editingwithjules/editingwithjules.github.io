<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jules Gerent</title>
  <meta http-equiv="refresh" content="1;url=https://julesgerent.github.io/portfolio" />

  <style>
    @font-face {
      font-family: 'MADE Outer Sans';
      src: url('assets/fonts/MADEOuterSans.woff2') format('woff2');
      font-weight: 400;
    }

    :root {
      --font: 'MADE Outer Sans', sans-serif;
      --expo: cubic-bezier(0.16, 1, 0.3, 1);
      --cream: #EDE8DF;
      --dim: rgba(237, 232, 223, 0.45);
      --divider: rgba(237, 232, 223, 0.08);
      --glass-bg: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.18);
      --glass-shadow: rgba(0, 0, 30, 0.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scrollbar-width: none; }
    html::-webkit-scrollbar { display: none; }

    body {
      font-family: var(--font);
      color: var(--cream);
      overflow: hidden;
      height: 100vh;
      background: linear-gradient(to bottom, #000000 0%, #00000d 30%, #000012 60%, #00001a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(32px, 5vw, 56px);
    }

    .wordmark {
      font-size: clamp(52px, 10vw, 140px);
      font-weight: 700;
      line-height: 0.93;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: var(--cream);
      text-align: center;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.8s var(--expo) 0.1s forwards;
    }

    .wordmark em {
      font-style: normal;
      color: rgba(237, 232, 223, 0.15);
    }

    .glow-divider {
      width: clamp(120px, 20vw, 240px);
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(237,232,223,0.15) 20%, rgba(237,232,223,0.15) 80%, transparent);
      opacity: 0;
      animation: fadeUp 0.8s var(--expo) 0.25s forwards;
    }

    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      opacity: 0;
      animation: fadeUp 0.8s var(--expo) 0.4s forwards;
    }

    .message {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .progress-bar {
      width: clamp(140px, 22vw, 220px);
      height: 1px;
      background: rgba(237,232,223,0.1);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(237,232,223,0.6));
      width: 0%;
      animation: fill 1s linear forwards;
    }

    .link {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      border-bottom: 1px solid rgba(237,232,223,0.15);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .link:hover {
      color: var(--cream);
      border-color: rgba(237,232,223,0.4);
    }

    .link::after { content: ' →'; }

    .footer {
      position: fixed;
      bottom: clamp(20px, 4vh, 36px);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(237,232,223,0.18);
      opacity: 0;
      animation: fadeUp 0.8s var(--expo) 0.55s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fill {
      from { width: 0%; }
      to   { width: 100%; }
    }
  </style>
</head>
<body>

  <h1 class="wordmark">Jules<br><em>Gerent</em></h1>

  <div class="glow-divider"></div>

  <div class="bottom">
    <p class="message">redirection en cours…</p>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <a class="link" href="https://julesgerent.github.io/portfolio">accéder directement</a>
  </div>

  <footer class="footer">© 2026 — Jules Gerent</footer>

</body>
</html>
